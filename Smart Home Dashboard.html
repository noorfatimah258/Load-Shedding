<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Load Shedding Light Switch</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            transition: 0.5s;
            text-align: center;
            padding-top: 100px;
        }

        .dark-mode {
            background-color: black;
            color: white;
        }

        img {
            width: 200px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <h1>Smart Home Dashboard</h1>

    <button id="toggleBtn" class="btn btn-primary m-2">Toggle Power</button>
    <button id="hideBtn" class="btn btn-danger m-2">Hide Controls</button>

    <br>

    <img id="fan" src="https://cdn-icons-png.flaticon.com/512/1048/1048953.png" alt="Fan">

    <script>
        // Toggle Light (Dark Mode)
        $("#toggleBtn").click(function() {
            $("body").toggleClass("dark-mode");
        });

        // Hide Fan with Fade Effect
        $("#hideBtn").click(function() {
            $("#fan").fadeToggle();
        });
    </script>

</body>
</html>
